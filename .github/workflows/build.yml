name: Build CinemanaFix Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show project files
        run: |
          echo "Workspace: ${{ github.workspace }}"
          pwd
          ls -la
          find . -maxdepth 3 -type f

      - name: Install dependencies
        run: |
          brew install make ldid xz
          gmake --version
          xcode-select -p

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          mkdir -p "$THEOS/sdks"
          curl -L https://github.com/theos/sdks/releases/download/2024-10-27/iPhoneOS17.5.sdk.tar.xz -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C "$THEOS/sdks/"
          echo "Installed SDKs:"
          ls -la "$THEOS/sdks/"

      - name: Build dylib
        run: |
          cd "${{ github.workspace }}"
          gmake clean 2>/dev/null || true
          gmake \
            THEOS="$THEOS" \
            THEOS_MAKE_PATH="$THEOS/makefiles" \
            TARGET="iphone:clang:17.5:14.0" \
            ARCHS="arm64" \
            DEBUG=0 \
            FINALPACKAGE=0
          echo "Built dylibs:"
          find . -name "*.dylib" -exec ls -lh {} \;

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: CinemanaFix_dylib
          path: |
            ${{ github.workspace }}/.theos/obj/*.dylib
            ${{ github.workspace }}/.theos/obj/debug/*.dylib
            ${{ github.workspace }}/.theos/obj/release/*.dylib
          retention-days: 30
