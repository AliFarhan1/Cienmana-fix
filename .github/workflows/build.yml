name: Build CinemanaFix Dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show project files
        run: |
          echo "Workspace: ${{ github.workspace }}"
          pwd
          ls -la
          find . -maxdepth 3 -type f

      - name: Install dependencies
        run: |
          brew install make ldid
          gmake --version
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-path

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          ls -la "$THEOS"

      - name: Build dylib
        run: |
          cd "${{ github.workspace }}"
          export SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          gmake clean 2>/dev/null || true
          gmake \
            THEOS="$THEOS" \
            THEOS_MAKE_PATH="$THEOS/makefiles" \
            TARGET="iphone:clang:latest:14.0" \
            ARCHS="arm64" \
            DEBUG=0 \
            FINALPACKAGE=0 \
            SDKROOT="$SDKROOT"
          echo "Built files:"
          find . -name "*.dylib" -o -name "*.deb" | xargs ls -lh || true

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: CinemanaFix_dylib
          path: |
            ${{ github.workspace }}/.theos/obj/*.dylib
            ${{ github.workspace }}/.theos/obj/debug/*.dylib
            ${{ github.workspace }}/.theos/obj/release/*.dylib
          retention-days: 30
